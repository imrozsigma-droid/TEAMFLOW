<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email</title>
  <style>
    body      { margin: 0; padding: 0; background: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .wrapper  { max-width: 600px; margin: 32px auto; background: #ffffff; border-radius: 8px; overflow: hidden; }
    .header   { background: #0f172a; padding: 24px 32px; }
    .header h1 { margin: 0; color: #ffffff; font-size: 20px; font-weight: 600; }
    .body     { padding: 32px; color: #1e293b; font-size: 15px; line-height: 1.6; }
    .footer   { padding: 16px 32px; background: #f8fafc; color: #94a3b8; font-size: 12px; text-align: center; }
    a         { color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>{{APP_NAME}}</h1>
    </div>
    <div class="body">
      {{CONTENT}}
    </div>
    <div class="footer">
      You received this email because you have an account with us.<br />
      If you did not request this, please ignore this email.
    </div>
  </div>
</body>
</html>
